<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Logic - Portfolio Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="bg-primary text-white py-3">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <h1 class="h3 mb-0"><i class="fas fa-shopping-cart me-2"></i>TechStore</h1>
                </div>
                <div class="col-md-4">
                    <div class="search-bar">
                        <div class="input-group">
                            <input type="text" class="form-control" id="product-search" placeholder="Search products...">
                            <button class="btn btn-outline-light" type="button">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 text-end">
                    <div class="header-actions">
                        <button class="btn btn-outline-light btn-sm me-2" onclick="toggleCart()">
                            <i class="fas fa-shopping-cart me-1"></i>
                            Cart (<span id="cart-count">0</span>)
                        </button>
                        <button class="btn btn-outline-light btn-sm" onclick="toggleWishlist()">
                            <i class="fas fa-heart me-1"></i>
                            Wishlist (<span id="wishlist-count">0</span>)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container my-4">
        <!-- Products Section -->
        <section class="products-section mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Featured Products</h2>
                <div class="filter-controls">
                    <select class="form-select form-select-sm" id="category-filter" style="width: auto;">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                        <option value="home">Home & Garden</option>
                    </select>
                    <select class="form-select form-select-sm ms-2" id="sort-filter" style="width: auto;">
                        <option value="name">Sort by Name</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>

            <div class="products-grid" id="products-grid">
                <!-- Products will be dynamically inserted here -->
            </div>
        </section>

        <!-- Shopping Cart Sidebar -->
        <aside class="cart-sidebar" id="cart-sidebar">
            <div class="cart-header">
                <h4><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h4>
                <button class="btn-close" onclick="toggleCart()"></button>
            </div>
            <div class="cart-body">
                <div id="cart-items">
                    <!-- Cart items will be dynamically inserted here -->
                </div>
                <div class="cart-summary" id="cart-summary">
                    <!-- Cart summary will be dynamically inserted here -->
                </div>
            </div>
            <div class="cart-footer">
                <button class="btn btn-secondary w-100 mb-2" onclick="clearCart()">Clear Cart</button>
                <button class="btn btn-primary w-100" onclick="proceedToCheckout()">Checkout</button>
            </div>
        </aside>

        <!-- Wishlist Sidebar -->
        <aside class="wishlist-sidebar" id="wishlist-sidebar">
            <div class="wishlist-header">
                <h4><i class="fas fa-heart me-2"></i>Wishlist</h4>
                <button class="btn-close" onclick="toggleWishlist()"></button>
            </div>
            <div class="wishlist-body">
                <div id="wishlist-items">
                    <!-- Wishlist items will be dynamically inserted here -->
                </div>
            </div>
        </aside>

        <!-- Overlay -->
        <div class="overlay" id="overlay" onclick="closeSidebars()"></div>
    </main>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Checkout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Checkout Steps -->
                    <div class="checkout-steps">
                        <div class="step-indicators">
                            <div class="step active" data-step="1">
                                <div class="step-circle">1</div>
                                <span>Shipping</span>
                            </div>
                            <div class="step" data-step="2">
                                <div class="step-circle">2</div>
                                <span>Payment</span>
                            </div>
                            <div class="step" data-step="3">
                                <div class="step-circle">3</div>
                                <span>Review</span>
                            </div>
                        </div>
                    </div>

                    <!-- Checkout Form -->
                    <form id="checkout-form">
                        <!-- Step 1: Shipping Information -->
                        <div class="checkout-step active" data-step="1">
                            <h5>Shipping Information</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">First Name *</label>
                                    <input type="text" class="form-control" id="firstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Last Name *</label>
                                    <input type="text" class="form-control" id="lastName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address *</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number *</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Street Address *</label>
                                <input type="text" class="form-control" id="address" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="city" class="form-label">City *</label>
                                    <input type="text" class="form-control" id="city" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="state" class="form-label">State *</label>
                                    <select class="form-select" id="state" required>
                                        <option value="">Select State</option>
                                        <option value="CA">California</option>
                                        <option value="NY">New York</option>
                                        <option value="TX">Texas</option>
                                        <option value="FL">Florida</option>
                                    </select>
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label for="zip" class="form-label">ZIP Code *</label>
                                    <input type="text" class="form-control" id="zip" required>
                                </div>
                            </div>
                        </div>

                        <!-- Step 2: Payment Information -->
                        <div class="checkout-step" data-step="2">
                            <h5>Payment Information</h5>
                            <div class="mb-3">
                                <label for="cardName" class="form-label">Name on Card *</label>
                                <input type="text" class="form-control" id="cardName" required>
                            </div>
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label">Card Number *</label>
                                <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="expiry" class="form-label">Expiry Date *</label>
                                    <input type="text" class="form-control" id="expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="cvv" class="form-label">CVV *</label>
                                    <input type="text" class="form-control" id="cvv" placeholder="123" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="sameAsShipping">
                                    <label class="form-check-label" for="sameAsShipping">
                                        Billing address same as shipping
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Step 3: Order Review -->
                        <div class="checkout-step" data-step="3">
                            <h5>Order Review</h5>
                            <div id="order-review">
                                <!-- Order review will be dynamically inserted here -->
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="prev-btn" onclick="previousCheckoutStep()" style="display: none;">Previous</button>
                    <button type="button" class="btn btn-primary" id="next-btn" onclick="nextCheckoutStep()">Next</button>
                    <button type="button" class="btn btn-success" id="place-order-btn" onclick="placeOrder()" style="display: none;">Place Order</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Success Modal -->
    <div class="modal fade" id="orderSuccessModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body text-center p-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle fa-5x text-success"></i>
                    </div>
                    <h3>Order Placed Successfully!</h3>
                    <p class="text-muted mb-4">Your order has been placed and will be delivered soon.</p>
                    <div id="order-details">
                        <!-- Order details will be inserted here -->
                    </div>
                    <button type="button" class="btn btn-primary mt-3" data-bs-dismiss="modal">Continue Shopping</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
